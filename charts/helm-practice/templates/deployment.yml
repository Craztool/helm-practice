apiVersion: apps/v1
kind: Deployment
metadata:
  name: helm-practice-deployment
spec:
  replicas: {{ .Values.replicaCount }}
  selector: 
    matchLabels:
      app: helm-practice
  template:
    metadata:
      labels:
        app: helm-practice
    spec:
      containers:
        - name: helm-practice-containers
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          ports:
            - containerPort: 80