name: CI

on: [push]

jobs:
    build-and-push:
        runs-on: ubuntu-latest
        permissions:
            contents: write
            packages: write
        
        steps:
            - name: Copy code
              uses: actions/checkout@v4

            - name: Login in ghcr.io
              uses: docker/login-action@v3
              with:
                    registry: ghcr.io
                    username: ${{ github.actor }}
                    password: ${{ secrets.GITHUB_TOKEN }}
            - name: Build and push
              uses: docker/build-push-action@v6
              with:
                context: .
                push: true
                tags: |
                    ghcr.io/craztool/helm-practice:latest
                    ghcr.io/craztool/helm-practice:${{github.sha}}

            - name: Обновление манифеста и авто-пуш
              run: |
                sed -i -E "s|tag: .*|tag: ${{ github.sha }}|g" charts/helm-practice/values.yaml
                git config --global user.name "Github Actions Bot"
                git config --global user.email "actions@github.com"
                git add charts/helm-practice/values.yaml
                git commit -m "GitOps: update image tag to ${{ github.sha }}"
                git push