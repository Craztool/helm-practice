name: CI Pipeline

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/helm-site:latest
            ${{ secrets.DOCKER_USERNAME }}/helm-site:${{ github.sha }}

      - name: Update Helm values.yaml
        run: |
          sed -i "s/tag: .*/tag: ${{ github.sha }}/g" charts/helm-practice/values.yaml
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add charts/helm-practice/values.yaml
          git commit -m "Update image tag to ${{ github.sha }}" || echo "No changes to commit"
          git push